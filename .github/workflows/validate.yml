name: Validate Index

on:
  pull_request:
    paths:
      - 'packages/**'
      - 'index.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run index validator
        run: python3 scripts/validate_index.py
